<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Taktikboard — Handball D-Jugend</title>
<style>
:root[data-theme="dark"]{
  --bg:#0f1115; --bg-elevated:#171a21; --bg-elevated-2:#1e222b;
  --ink:#e8eaed; --ink-soft:#cdd3df; --muted:#9aa3b2;
  --line:#2a2f3a; --line-strong:#3a414f;
  --accent:#ff8a00; --accent-2:#3ec1ff;
  --good:#5dd39e; --warn:#ffd166; --bad:#ef476f; --pur:#a78bfa;
  --shadow:0 4px 12px rgba(0,0,0,0.4);
  --bg-overlay:rgba(0,0,0,0.7);
}
:root[data-theme="light"]{
  --bg:#f7f6f3; --bg-elevated:#fff; --bg-elevated-2:#efece5;
  --ink:#1a1d24; --ink-soft:#3a3f4a; --muted:#6b7280;
  --line:#dcd8cf; --line-strong:#bdb6a8;
  --accent:#d96e00; --accent-2:#1d8fc7;
  --good:#2e9e6e; --warn:#c89318; --bad:#d63a5e; --pur:#7a5dd6;
  --shadow:0 2px 8px rgba(60,40,20,0.08);
  --bg-overlay:rgba(20,15,10,0.5);
}
:root{
  --court-bg:#f4eee2; --court-line:#7a6e54; --court-line-thin:#a0916f;
  --att:#ff8a00; --def:#3ec1ff; --tw:#5dd39e; --ball:#ffd166;
  --pen-run:#ff8a00; --pen-pass:#3ec1ff; --pen-shot:#ef476f;
  --pen-free:#000000;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:"IBM Plex Sans","Inter","Segoe UI",system-ui,sans-serif;
  line-height:1.4;height:100%;overflow:hidden}
button{font-family:inherit}

.app{display:grid;grid-template-rows:auto 1fr;height:100vh;height:100dvh}

.toolbar{display:flex;align-items:center;gap:10px;padding:8px 12px;
  background:var(--bg);border-bottom:1px solid var(--line);flex-wrap:wrap;z-index:20;
  touch-action:manipulation}
.tb-title{font-weight:700;font-size:14px;color:var(--accent);letter-spacing:.02em;margin-right:6px}
.tb-group{display:flex;align-items:center;gap:4px;padding:3px;
  background:var(--bg-elevated);border:1px solid var(--line);border-radius:8px}
.tb-btn{background:transparent;border:0;color:var(--muted);
  padding:6px 10px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12.5px;
  white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.tb-btn:hover{color:var(--ink)}
.tb-btn[aria-pressed="true"]{background:var(--accent);color:#fff}
.tb-btn svg{width:14px;height:14px}
.tb-sep{width:1px;height:24px;background:var(--line);margin:0 4px}
.tb-select{background:var(--bg-elevated);border:1px solid var(--line);
  border-radius:8px;color:var(--ink);font-family:inherit;font-size:12.5px;
  padding:6px 10px;outline:none;cursor:pointer}
.tb-select:focus{border-color:var(--accent)}
.tb-spacer{flex:1}
.tb-action{background:var(--bg-elevated);border:1px solid var(--line);
  color:var(--ink);padding:6px 12px;border-radius:8px;cursor:pointer;
  font-weight:600;font-size:12.5px;font-family:inherit}
.tb-action:hover{border-color:var(--accent);color:var(--accent)}
.tb-action.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb-action.primary:hover{filter:brightness(1.08);color:#fff}

.tb-pen{width:34px;height:30px;padding:0;display:flex;align-items:center;
  justify-content:center;background:transparent;border:0;cursor:pointer;border-radius:6px}
.tb-pen:hover{background:var(--bg-elevated-2)}
.tb-pen[aria-pressed="true"]{background:var(--bg-elevated-2);box-shadow:inset 0 -3px 0 currentColor}
.tb-pen.pen-run{color:var(--pen-run)}
.tb-pen.pen-pass{color:var(--pen-pass)}
.tb-pen.pen-shot{color:var(--pen-shot)}
.tb-pen.pen-erase{color:var(--muted)}
.tb-pen.pen-free{color:#c8ccd4}
.tb-pen.pen-free[aria-pressed="true"]{color:#ff8a00}
.tb-pen svg{width:18px;height:18px}

/* Farbpalette + Strichstärke für den freien Stift */
.pen-palette{position:absolute;background:var(--bg-elevated);
  border:1px solid var(--accent);border-radius:8px;padding:6px;
  box-shadow:var(--shadow);z-index:55;
  display:none;flex-direction:column;gap:6px;
  top:50px;left:50%;transform:translateX(-50%)}
.pen-palette.show{display:flex}
.pp-row{display:flex;gap:4px}
.pp-sizes{padding-top:5px;border-top:1px solid var(--line)}
.pp-color{width:32px;height:32px;border-radius:6px;border:2px solid var(--line);
  cursor:pointer;padding:0;transition:transform 0.1s, border-color 0.1s}
.pp-color:hover, .pp-color:active{transform:scale(1.08)}
.pp-color.selected{border-color:var(--ink);box-shadow:0 0 0 2px var(--accent)}
.pp-size{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:6px;
  color:var(--ink);cursor:pointer;padding:5px;display:flex;align-items:center;justify-content:center}
.pp-size svg{width:30px;height:12px}
.pp-size.selected{border-color:var(--accent);background:var(--bg-elevated-2);box-shadow:0 0 0 2px var(--accent) inset}
.pp-size:hover{border-color:var(--accent)}

.main{display:grid;grid-template-columns:150px 1fr;height:100%;overflow:hidden}
.bank{background:var(--bg-elevated);border-right:1px solid var(--line);
  padding:0;overflow:hidden;
  display:flex;flex-direction:column;position:relative}
.bank-scrollbtn{flex-shrink:0;background:var(--bg-elevated-2);
  border:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  color:var(--accent);cursor:pointer;padding:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:inherit;font-size:14px;font-weight:700;
  touch-action:manipulation}
.bank-scrollbtn:active{background:var(--accent);color:#fff}
.bank-scrollbtn:disabled{opacity:0.3;cursor:default}
.bank-scrollbtn svg{width:18px;height:18px}
.bank-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 8px;
  -webkit-overflow-scrolling:touch}
.bank-section{margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.bank-section:last-child{border-bottom:0;margin-bottom:0}
.bank-section h4{margin:0 0 8px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--accent);font-weight:700;padding-left:2px}
.bank-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.bank-grid.single{grid-template-columns:1fr}
.bank-item{background:var(--bg);border:1px solid var(--line);border-radius:8px;
  padding:4px;display:flex;align-items:center;justify-content:center;cursor:grab;
  aspect-ratio:1;touch-action:none}
.bank-item:active{cursor:grabbing}
.bank-item svg{width:100%;height:100%;display:block;pointer-events:none}

.board-wrap{background:var(--court-bg);position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;padding:8px;touch-action:none}
.board{width:100%;height:100%;display:block;touch-action:none;-webkit-user-select:none;user-select:none}

.label-edit{position:absolute;background:var(--bg-elevated);border:1px solid var(--accent);
  border-radius:8px;padding:8px;box-shadow:var(--shadow);z-index:50;
  display:none;flex-direction:column;gap:6px;width:240px}
.label-edit.show{display:flex}
.label-edit input{background:var(--bg);border:1px solid var(--line);
  border-radius:6px;color:var(--ink);font-family:inherit;font-size:13px;padding:6px 8px;outline:none}
.label-edit input:focus{border-color:var(--accent)}
.label-edit .le-row{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap}
.label-edit button{background:var(--bg);border:1px solid var(--line);
  color:var(--ink);padding:5px 10px;border-radius:6px;cursor:pointer;
  font-family:inherit;font-size:12px}
.label-edit button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.label-edit button.danger{color:var(--bad)}
.label-edit .le-hint{font-size:10.5px;color:var(--muted)}
.label-edit .le-quick{display:flex;flex-wrap:wrap;gap:4px;padding:4px 0 2px;
  border-top:1px dashed var(--line);margin-top:2px}
.label-edit .le-quick-label{font-size:10px;color:var(--muted);width:100%;letter-spacing:.07em;
  text-transform:uppercase;font-weight:600;margin-bottom:2px;margin-top:2px}
.label-edit .le-q-btn{background:var(--bg);border:1px solid var(--line);
  color:var(--ink);padding:4px 8px;border-radius:5px;cursor:pointer;
  font-family:inherit;font-size:11.5px;font-weight:600;min-width:34px}
.label-edit .le-q-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}

.save-overlay{position:fixed;inset:0;background:var(--bg-overlay);z-index:60;display:none}
.save-overlay.show{display:block}
.save-panel{position:fixed;top:0;right:0;height:100vh;height:100dvh;
  width:min(420px,92vw);background:var(--bg);border-left:1px solid var(--line-strong);
  z-index:61;transform:translateX(100%);transition:transform .25s;
  display:flex;flex-direction:column}
.save-panel.show{transform:translateX(0)}
.save-head{padding:12px 16px;border-bottom:1px solid var(--line);background:var(--bg-elevated);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.save-head h2{margin:0;font-size:15px;font-weight:700}
.save-head button{background:var(--bg-elevated-2);border:1px solid var(--line);
  border-radius:7px;color:var(--ink);cursor:pointer;padding:5px;display:flex}
.save-head button svg{width:16px;height:16px}
.save-controls{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap}
.save-controls .tb-action{flex:1;min-width:90px;font-size:12px;padding:7px 8px}
.save-controls label.tb-action{cursor:pointer;text-align:center}
.save-stats{font-size:11.5px;color:var(--muted);padding:8px 16px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.save-stats strong{color:var(--ink)}
.save-list{padding:8px 16px 24px;overflow-y:auto;flex:1}
.save-card{background:var(--bg-elevated);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;margin-bottom:8px}
.save-card .sc-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;cursor:pointer}
.save-card .sc-name{font-weight:700;font-size:13.5px}
.save-card .sc-date{font-size:11px;color:var(--muted);margin-top:2px}
.save-card .sc-meta{font-size:11px;color:var(--ink-soft);margin-top:3px}
.save-card .sc-actions{display:flex;gap:5px;flex-shrink:0;align-items:center}
.save-card .sc-stars{font-size:15px;line-height:1;cursor:pointer;white-space:nowrap}
.save-card .sc-stars .star{color:var(--line-strong);user-select:none;padding:1px}
.save-card .sc-stars .star.filled{color:var(--warn)}
.save-card .icon-btn{background:var(--bg);border:1px solid var(--line);border-radius:6px;
  width:26px;height:26px;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center}
.save-card .icon-btn:hover{color:var(--accent);border-color:var(--accent)}
.save-card .icon-btn.danger:hover{color:var(--bad);border-color:var(--bad)}
.save-card .icon-btn svg{width:13px;height:13px}
.save-card .sc-body{display:none;padding-top:8px;margin-top:8px;border-top:1px solid var(--line)}
.save-card.open .sc-body{display:block}
.save-card .sc-fields{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.save-card .sc-fields label{font-size:10px;letter-spacing:.07em;
  text-transform:uppercase;color:var(--muted);font-weight:600;display:flex;flex-direction:column;gap:3px}
.save-card .sc-fields input, .save-card .sc-fields textarea{
  background:var(--bg);border:1px solid var(--line);border-radius:6px;
  color:var(--ink);font-family:inherit;font-size:12.5px;
  padding:6px 8px;outline:none;text-transform:none;letter-spacing:normal;font-weight:400}
.save-card .sc-fields textarea{resize:vertical;min-height:50px}
.save-card .sc-rowbtns{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}

.save-dialog{position:fixed;inset:0;background:var(--bg-overlay);z-index:70;
  display:none;align-items:center;justify-content:center;padding:20px}
.save-dialog.show{display:flex}
.save-dialog-inner{background:var(--bg-elevated);border:1px solid var(--line-strong);
  border-radius:12px;padding:18px;max-width:380px;width:100%}
.save-dialog-inner h3{margin:0 0 12px;font-size:14px}
.save-dialog-inner input{width:100%;background:var(--bg);border:1px solid var(--line);
  border-radius:7px;color:var(--ink);font-family:inherit;font-size:13.5px;
  padding:7px 10px;outline:none;margin-bottom:14px}
.save-dialog-inner input:focus{border-color:var(--accent)}
.save-dialog-inner .sd-row{display:flex;gap:8px;justify-content:flex-end}

.orientation-hint{display:none;background:var(--bg-elevated);border-bottom:1px solid var(--warn);
  padding:6px 12px;font-size:11px;color:var(--warn);text-align:center}
@media (orientation: portrait) and (max-width: 900px){
  .orientation-hint{display:block}
  .main{grid-template-columns:90px 1fr}
}

.tb-token{cursor:grab;touch-action:none}
.tb-token.dragging{cursor:grabbing;opacity:0.85}
.tb-token text{user-select:none;pointer-events:none;
  font-family:"IBM Plex Sans",system-ui,sans-serif;font-weight:700}

/* PRINT */
.print-view{display:none}
@media print {
  body > *:not(.print-view){display:none !important}
  .print-view{display:block !important}
  @page{size:A4 landscape;margin:10mm}
  html,body{background:#fff !important;color:#000 !important;height:auto;overflow:visible}
  .pv-head{border-bottom:2px solid #000;padding-bottom:5mm;margin-bottom:5mm}
  .pv-head h1{font-size:18pt;margin:0 0 2mm}
  .pv-head .pv-meta{display:flex;gap:6mm;font-size:10pt;color:#444;flex-wrap:wrap}
  .pv-head .pv-meta b{color:#000}
  .pv-board{width:100%;max-width:270mm;margin:0 auto}
  .pv-board svg{width:100%;height:auto;background:#f4eee2;border:0.5mm solid #888;border-radius:1mm}
  .pv-foot{margin-top:5mm;font-size:10pt;color:#222}
  .pv-foot .pv-comment{background:#fffbeb;border-left:1mm solid #d96e00;
    padding:2mm 3mm;margin-bottom:3mm}
}
</style>
</head>
<body>

<div class="app">
  <div class="toolbar">
    <div class="tb-title">Taktikboard</div>

    <select class="tb-select" id="selAusschnitt" title="Spielfeld-Ausschnitt">
      <option value="totale">Totale (beide Tore)</option>
      <option value="angriff_oben" selected>Angriff aufs Tor (Tor oben)</option>
      <option value="verteidigung_oben">Verteidigung vorm Tor (Tor oben)</option>
      <option value="halbfeld_links">Halbfeld (Tor links)</option>
      <option value="halbfeld_rechts">Halbfeld (Tor rechts)</option>
      <option value="torraum_oben">Torraum (Tor oben)</option>
    </select>

    <select class="tb-select" id="selPreset" title="Aufstellung laden">
      <option value="">— Aufstellung wählen —</option>
    </select>

    <div class="tb-sep"></div>

    <button class="tb-action" id="btnUndo" title="Rückgängig (bis 3 Schritte)" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 5 5v0a5 5 0 0 1-5 5h-3"/></svg>
      Zurück
    </button>

    <div class="tb-group" role="group" aria-label="Werkzeug">
      <button class="tb-btn tb-btn-mode" id="modeSelect" aria-pressed="true" title="Verschieben">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7 17 2-7 7-2L3 3z"/></svg>
        Verschieben
      </button>
    </div>

    <div class="tb-group" role="group" aria-label="Stift">
      <button class="tb-pen pen-run" id="penRun" aria-pressed="false" title="Laufweg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12h14"/><path d="M14 6l6 6-6 6"/></svg>
      </button>
      <button class="tb-pen pen-pass" id="penPass" aria-pressed="false" title="Pass">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-dasharray="3 2.5"><path d="M4 12h14"/><path d="M14 6l6 6-6 6" stroke-dasharray="0"/></svg>
      </button>
      <button class="tb-pen pen-shot" id="penShot" aria-pressed="false" title="Wurf">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M4 12h14"/><path d="M14 6l6 6-6 6"/></svg>
      </button>
      <button class="tb-pen pen-erase" id="penErase" aria-pressed="false" title="Linie löschen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 21L3 17 14 6l4 4z"/><path d="M17 9l4 4"/></svg>
      </button>
      <button class="tb-pen pen-free" id="penFree" aria-pressed="false" title="Freier Stift (Farbe wählen)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l3.5-1 11-11-2.5-2.5-11 11L3 21z"/><path d="M14 6l3-3 3 3-3 3"/></svg>
      </button>
    </div>

    <!-- Farbpalette + Strichstärke (Popup unterhalb des Stift-Buttons) -->
    <div class="pen-palette" id="penPalette" role="dialog" aria-label="Stiftfarbe">
      <div class="pp-row">
        <button class="pp-color" data-color="#000000" style="background:#000000" title="Schwarz"></button>
        <button class="pp-color" data-color="#3da655" style="background:#3da655" title="Grün"></button>
        <button class="pp-color" data-color="#1d4ed8" style="background:#1d4ed8" title="Dunkelblau"></button>
        <button class="pp-color" data-color="#dc2626" style="background:#dc2626" title="Rot"></button>
        <button class="pp-color" data-color="#facc15" style="background:#facc15" title="Gelb"></button>
      </div>
      <div class="pp-row pp-sizes">
        <button class="pp-size" data-size="2" title="Dünn"><svg viewBox="0 0 32 12"><line x1="2" y1="6" x2="30" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button class="pp-size selected" data-size="3" title="Mittel"><svg viewBox="0 0 32 12"><line x1="2" y1="6" x2="30" y2="6" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg></button>
        <button class="pp-size" data-size="5" title="Dick"><svg viewBox="0 0 32 12"><line x1="2" y1="6" x2="30" y2="6" stroke="currentColor" stroke-width="7" stroke-linecap="round"/></svg></button>
      </div>
    </div>

    <button class="tb-action" id="btnClearLines">Linien leeren</button>
    <button class="tb-action" id="btnClearAll">Board leeren</button>

    <div class="tb-spacer"></div>

    <button class="tb-action primary" id="btnOpenSave">Speichern…</button>
    <button class="tb-action" id="btnPrint">PDF</button>

    <div class="tb-group" role="group" aria-label="Theme">
      <button class="tb-btn" id="thDark" aria-pressed="true" title="Dark">●</button>
      <button class="tb-btn" id="thLight" aria-pressed="false" title="Light">○</button>
    </div>
  </div>

  <div class="orientation-hint">Tipp: Im Querformat (Tablet seitlich) hast du mehr Platz.</div>

  <div class="main">
    <div class="bank" id="bank">
      <button class="bank-scrollbtn" id="bankUp" aria-label="Nach oben scrollen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
      </button>
      <div class="bank-content" id="bankContent">
        <div class="bank-section"><h4>Angriff</h4><div class="bank-grid" id="bankAtt"></div></div>
        <div class="bank-section"><h4>Abwehr</h4><div class="bank-grid" id="bankDef"></div></div>
        <div class="bank-section"><h4>Torwart / Helfer</h4><div class="bank-grid" id="bankTwTh"></div></div>
        <div class="bank-section"><h4>Wechsel</h4><div class="bank-grid" id="bankSub"></div></div>
        <div class="bank-section"><h4>Bälle</h4><div class="bank-grid" id="bankBall"></div></div>
        <div class="bank-section"><h4>Material</h4><div class="bank-grid" id="bankMat"></div></div>
      </div>
      <button class="bank-scrollbtn" id="bankDown" aria-label="Nach unten scrollen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>

    <div class="board-wrap" id="boardWrap">
      <svg class="board" id="board" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="label-edit" id="labelEdit">
        <div class="le-hint">Beschriftung bearbeiten</div>
        <input type="text" id="labelInput" maxlength="6" placeholder="Eigener Text (z.B. Tobi) oder unten auswählen">
        <div class="le-quick" id="lblQuick"><!-- wird per JS gefüllt --></div>
        <div class="le-row">
          <button class="danger" id="lblRemove">Entfernen</button>
          <button id="lblCancel">Abbrechen</button>
          <button class="primary" id="lblSave">OK</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="save-overlay" id="saveOverlay"></div>

<script>
"use strict";

/* THEME */
function setTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  document.getElementById("thDark").setAttribute("aria-pressed", t==="dark");
  document.getElementById("thLight").setAttribute("aria-pressed", t==="light");
  try{ localStorage.setItem("tb_theme", t); }catch(e){}
}
document.getElementById("thDark").addEventListener("click", ()=>setTheme("dark"));
document.getElementById("thLight").addEventListener("click", ()=>setTheme("light"));
(function(){
  let t="dark"; try{ t = localStorage.getItem("tb_theme") || "dark"; }catch(e){}
  setTheme(t);
})();

/* ZUSTAND */
const STATE = { tokens:[], lines:[], mode:"select", schnitt:"angriff_oben", nextId:1, history:[] };

/* History für Undo (max. 3 Schritte zurück) */
function pushHistory(){
  // Snapshot vor jeder verändernden Aktion
  const snap = {
    tokens: STATE.tokens.map(t => Object.assign({}, t)),
    lines:  STATE.lines.map(l => Object.assign({}, l)),
    schnitt: STATE.schnitt
  };
  STATE.history.push(snap);
  while(STATE.history.length > 3) STATE.history.shift();
  updateUndoBtn();
}
function undo(){
  if(!STATE.history.length) return;
  const snap = STATE.history.pop();
  STATE.tokens = snap.tokens;
  STATE.lines  = snap.lines;
  if(snap.schnitt !== STATE.schnitt){
    STATE.schnitt = snap.schnitt;
    document.getElementById("selAusschnitt").value = snap.schnitt;
  }
  renderBoard();
  updateUndoBtn();
}
function updateUndoBtn(){
  const btn = document.getElementById("btnUndo");
  if(btn) btn.disabled = STATE.history.length === 0;
}

/* AUSSCHNITTE */
const AUSSCHNITTE = {
  /*
     Spielfeld-Geometrie (Tor oben, Querformat):
       viewBox 1000 × 700  →  1000 Einheiten = 20 m Spielfeldbreite (1 m = 50 Einheiten)
       Tor: 3 m breit, also 150 Einheiten, mittig auf x=500  →  x: 425…575
       Torraum (6 m): Linie 300 Einheiten unterhalb des Tors
         gerades Mittelstück direkt vor dem Tor:  x: 425…575, y = 320
         linker Viertelkreis: Mittelpunkt am linken Torpfosten (425, 20), Radius 300
         rechter Viertelkreis: Mittelpunkt am rechten Torpfosten (575, 20), Radius 300
       Freiwurflinie (9 m): gestrichelt, analog mit Radius 450
  */
  angriff_oben: {
    vb: "0 0 1000 700", label: "Angriff aufs Tor",
    pitch: function(){ return `
      <!-- Hintergrund -->
      <rect x="0" y="0" width="1000" height="700" fill="var(--court-bg)"/>
      <!-- Spielfeld-Außenlinien -->
      <rect x="0" y="0" width="1000" height="700" fill="none" stroke="var(--court-line)" stroke-width="4"/>
      <!-- Grundlinie (oben) -->
      <line x1="0" y1="20" x2="1000" y2="20" stroke="var(--court-line)" stroke-width="5"/>
      <!-- Mittellinie-Andeutung unten -->
      <line x1="0" y1="680" x2="1000" y2="680" stroke="var(--court-line-thin)" stroke-width="3" stroke-dasharray="14 10"/>
      <!-- Tor (3 m, mittig) -->
      <rect x="425" y="0" width="150" height="20" fill="none" stroke="#0f1115" stroke-width="6"/>
      <line x1="500" y1="0" x2="500" y2="20" stroke="#9aa3b2" stroke-width="1"/>
      <!-- Torraum 6 m: Viertelkreise vom Torpfosten ins Feld + gerades Mittelstück (sweep=0!) -->
      <path d="M 125 20 A 300 300 0 0 0 425 320 L 575 320 A 300 300 0 0 0 875 20"
            fill="rgba(150,140,110,0.14)" stroke="var(--court-line)" stroke-width="4"/>
      <!-- Freiwurflinie 9 m (gestrichelt) – Schnitt mit Seitenlinie x=0 bzw. x=1000:
           Kreis um (425, 20), Radius 450 → (0-425)² + (y-20)² = 450² → y ≈ 168 -->
      <path d="M 0 168 A 450 450 0 0 0 425 470 L 575 470 A 450 450 0 0 0 1000 168"
            fill="none" stroke="var(--court-line-thin)" stroke-width="3" stroke-dasharray="14 10"/>
      <!-- 7-m-Strafwurfmarke -->
      <line x1="475" y1="370" x2="525" y2="370" stroke="var(--court-line)" stroke-width="5"/>
      <!-- 4-m-Torwart-Wartelinie -->
      <line x1="485" y1="220" x2="515" y2="220" stroke="var(--court-line)" stroke-width="3"/>
    `; }
  },
  verteidigung_oben: {
    vb: "0 0 1000 700", label: "Verteidigung vorm Tor",
    pitch: function(){ return AUSSCHNITTE.angriff_oben.pitch(); }
  },
  torraum_oben: {
    vb: "0 0 1000 520", label: "Torraum-Nahaufnahme",
    /* Gleiche Geometrie wie angriff_oben (Tor oben mittig auf x=500, Torpfosten bei x=425/575,
       Grundlinie y=20, Torraum-Tiefe 300, 9m-Tiefe 450).
       ViewBox aber nur bis y=520 statt 700 → fokussierter auf den Torbereich, ohne den großen
       leeren Spielraum nach unten zur Mittellinie. */
    pitch: function(){ return `
      <rect x="0" y="0" width="1000" height="520" fill="var(--court-bg)"/>
      <rect x="0" y="0" width="1000" height="520" fill="none" stroke="var(--court-line)" stroke-width="4"/>
      <line x1="0" y1="20" x2="1000" y2="20" stroke="var(--court-line)" stroke-width="5"/>
      <rect x="425" y="0" width="150" height="20" fill="none" stroke="#0f1115" stroke-width="6"/>
      <line x1="500" y1="0" x2="500" y2="20" stroke="#9aa3b2" stroke-width="1"/>
      <!-- Torraum 6 m, sweep=0 -->
      <path d="M 125 20 A 300 300 0 0 0 425 320 L 575 320 A 300 300 0 0 0 875 20"
            fill="rgba(150,140,110,0.14)" stroke="var(--court-line)" stroke-width="4"/>
      <!-- 9 m gestrichelt, an Seitenlinie abgeschnitten (Schnitt bei y=168) -->
      <path d="M 0 168 A 450 450 0 0 0 425 470 L 575 470 A 450 450 0 0 0 1000 168"
            fill="none" stroke="var(--court-line-thin)" stroke-width="3" stroke-dasharray="14 10"/>
      <!-- 7-m-Strafwurfmarke -->
      <line x1="475" y1="370" x2="525" y2="370" stroke="var(--court-line)" stroke-width="5"/>
      <!-- 4-m-Torwart-Wartelinie -->
      <line x1="485" y1="220" x2="515" y2="220" stroke="var(--court-line)" stroke-width="3"/>
    `; }
  },
  totale: {
    /* Totale: 40 m × 20 m bei viewBox 1400 × 700  →  1 m = 35 Einheiten
       Linkes Tor an x=20 (mit Rand davor), rechtes Tor an x=1380.
       Mittelpunkte der Viertelkreise = Torpfosten.
       9m-Bogen-Schnitt mit Seitenlinie (y=0 oder y=700): bei Radius 315 und y-Distanz 298
       liegt x ≈ 122 bzw. (1400-122) ≈ 1278 */
    vb: "0 0 1400 700", label: "Totale",
    pitch: function(){ return `
      <rect x="0" y="0" width="1400" height="700" fill="var(--court-bg)"/>
      <rect x="0" y="0" width="1400" height="700" fill="none" stroke="var(--court-line)" stroke-width="4"/>
      <!-- Mittellinie -->
      <line x1="700" y1="0" x2="700" y2="700" stroke="var(--court-line)" stroke-width="3"/>
      <!-- Grundlinien (kräftig hinter den Toren) -->
      <line x1="20" y1="0" x2="20" y2="700" stroke="var(--court-line)" stroke-width="5"/>
      <line x1="1380" y1="0" x2="1380" y2="700" stroke="var(--court-line)" stroke-width="5"/>

      <!-- LINKES TOR (Wölbung nach rechts ins Feld → sweep=1) -->
      <rect x="20" y="298" width="20" height="105" fill="none" stroke="#0f1115" stroke-width="6"/>
      <!-- Torraum 6 m, Radius 210 -->
      <path d="M 20 88 A 210 210 0 0 1 230 298 L 230 403 A 210 210 0 0 1 20 613"
            fill="rgba(150,140,110,0.14)" stroke="var(--court-line)" stroke-width="4"/>
      <!-- 9 m, Radius 315, an Seitenlinie abgeschnitten -->
      <path d="M 122 0 A 315 315 0 0 1 335 298 L 335 403 A 315 315 0 0 1 122 700"
            fill="none" stroke="var(--court-line-thin)" stroke-width="3" stroke-dasharray="14 10"/>
      <!-- 7-m-Strafwurf links (7 m vor Tor → 7×35 = 245, also bei x=265 mittig vertikal y=350) -->
      <line x1="265" y1="340" x2="265" y2="360" stroke="var(--court-line)" stroke-width="5"/>
      <!-- 4-m-Wartelinie links -->
      <line x1="170" y1="340" x2="170" y2="360" stroke="var(--court-line)" stroke-width="3"/>

      <!-- RECHTES TOR (Wölbung nach links ins Feld → sweep=0) -->
      <rect x="1360" y="298" width="20" height="105" fill="none" stroke="#0f1115" stroke-width="6"/>
      <!-- Torraum 6 m -->
      <path d="M 1380 88 A 210 210 0 0 0 1170 298 L 1170 403 A 210 210 0 0 0 1380 613"
            fill="rgba(150,140,110,0.14)" stroke="var(--court-line)" stroke-width="4"/>
      <!-- 9 m an Seitenlinie abgeschnitten -->
      <path d="M 1278 0 A 315 315 0 0 0 1065 298 L 1065 403 A 315 315 0 0 0 1278 700"
            fill="none" stroke="var(--court-line-thin)" stroke-width="3" stroke-dasharray="14 10"/>
      <!-- 7-m rechts -->
      <line x1="1135" y1="340" x2="1135" y2="360" stroke="var(--court-line)" stroke-width="5"/>
      <!-- 4-m-Wartelinie rechts -->
      <line x1="1230" y1="340" x2="1230" y2="360" stroke="var(--court-line)" stroke-width="3"/>
    `; }
  },
  halbfeld_links: {
    vb: "0 0 1000 600", label: "Halbfeld (Tor links)",
    /* Tor 20 Einheiten von der linken Außenkante entfernt; davor Grundlinie als kräftiger Strich.
       Mittelpunkt der Viertelkreise = oberer/unterer Torpfosten bei (20, 255) bzw. (20, 345).
       9m-Bogen: Mittelpunkt (20, 255), Radius 270. Schnitt mit Grundlinie (x=20) ist trivial bei y=525.
       Schnitt mit oberer Seitenlinie (y=0): (x-20)² + 255² = 270² → x ≈ 108,7.
       Daher 9m-Linie startet oben bei (109, 0) und endet unten bei (109, 600). */
    pitch: function(){ return `
      <rect x="0" y="0" width="1000" height="600" fill="var(--court-bg)"/>
      <rect x="0" y="0" width="1000" height="600" fill="none" stroke="var(--court-line)" stroke-width="4"/>
      <!-- Grundlinie links (kräftig, hinter dem Tor) -->
      <line x1="20" y1="0" x2="20" y2="600" stroke="var(--court-line)" stroke-width="5"/>
      <!-- Mittellinie rechts angedeutet -->
      <line x1="980" y1="0" x2="980" y2="600" stroke="var(--court-line-thin)" stroke-width="3" stroke-dasharray="14 10"/>
      <!-- Tor (3 m, mittig vertikal), 20 Einheiten ins Feld -->
      <rect x="20" y="255" width="20" height="90" fill="none" stroke="#0f1115" stroke-width="6"/>
      <line x1="20" y1="300" x2="40" y2="300" stroke="#9aa3b2" stroke-width="1"/>
      <!-- Torraum 6 m (Radius 180), sweep=1 für Wölbung nach rechts ins Feld -->
      <path d="M 20 75 A 180 180 0 0 1 200 255 L 200 345 A 180 180 0 0 1 20 525"
            fill="rgba(150,140,110,0.14)" stroke="var(--court-line)" stroke-width="4"/>
      <!-- 9 m gestrichelt (Radius 270), Bogen startet/endet an der Seitenlinie (y=0 bzw. 600) -->
      <path d="M 108.7 0 A 270 270 0 0 1 290 255 L 290 345 A 270 270 0 0 1 108.7 600"
            fill="none" stroke="var(--court-line-thin)" stroke-width="3" stroke-dasharray="14 10"/>
      <!-- 7-m-Strafwurfmarke (vertikal, parallel zum Tor) -->
      <line x1="230" y1="290" x2="230" y2="310" stroke="var(--court-line)" stroke-width="5"/>
      <!-- 4-m-Wartelinie -->
      <line x1="150" y1="290" x2="150" y2="310" stroke="var(--court-line)" stroke-width="3"/>
    `; }
  },
  halbfeld_rechts: {
    vb: "0 0 1000 600", label: "Halbfeld (Tor rechts)",
    /* Spiegelbild von halbfeld_links: Tor bei x=980, Mittelpunkt bei (980, 255) bzw. (980, 345).
       9m an Seitenlinie abgeschnitten bei x = 1000 - 108,7 = 891,3 */
    pitch: function(){ return `
      <rect x="0" y="0" width="1000" height="600" fill="var(--court-bg)"/>
      <rect x="0" y="0" width="1000" height="600" fill="none" stroke="var(--court-line)" stroke-width="4"/>
      <line x1="20" y1="0" x2="20" y2="600" stroke="var(--court-line-thin)" stroke-width="3" stroke-dasharray="14 10"/>
      <!-- Grundlinie rechts -->
      <line x1="980" y1="0" x2="980" y2="600" stroke="var(--court-line)" stroke-width="5"/>
      <!-- Tor (3 m, mittig vertikal), 20 Einheiten von rechter Kante -->
      <rect x="960" y="255" width="20" height="90" fill="none" stroke="#0f1115" stroke-width="6"/>
      <line x1="960" y1="300" x2="980" y2="300" stroke="#9aa3b2" stroke-width="1"/>
      <!-- Torraum 6 m, sweep=0 für Wölbung nach links ins Feld -->
      <path d="M 980 75 A 180 180 0 0 0 800 255 L 800 345 A 180 180 0 0 0 980 525"
            fill="rgba(150,140,110,0.14)" stroke="var(--court-line)" stroke-width="4"/>
      <!-- 9 m gestrichelt, an Seitenlinie abgeschnitten -->
      <path d="M 891.3 0 A 270 270 0 0 0 710 255 L 710 345 A 270 270 0 0 0 891.3 600"
            fill="none" stroke="var(--court-line-thin)" stroke-width="3" stroke-dasharray="14 10"/>
      <!-- 7-m-Strafwurf (vertikal) -->
      <line x1="770" y1="290" x2="770" y2="310" stroke="var(--court-line)" stroke-width="5"/>
      <!-- 4-m-Wartelinie -->
      <line x1="850" y1="290" x2="850" y2="310" stroke="var(--court-line)" stroke-width="3"/>
    `; }
  }
};

const POOL_ATT  = ["LA","RA","RL","RR","RM","KM"];
const POOL_DEF  = ["1","2","3","4","5","6"];
const POOL_TW   = ["TW"];
const POOL_TH   = ["TH"];   // Trainingshelfer
const POOL_SUB  = ["W1","W2","W3","W4","W5"];
const POOL_BALL = ["B"];
const POOL_MAT  = ["Hütchen","Pylon","Bank","Matte"];

function tokenSvg(kind, label, opts){
  opts = opts || {};
  const r = opts.r || 30;
  // Schriftgröße an Label-Länge anpassen: 1 Zeichen groß, 2+ kleiner
  const labLen = String(label||"").length;
  switch(kind){
    case "att": {
      // Dreieck mit Spitze nach oben — Text in der breiten Hälfte unten
      const fs = labLen <= 1 ? r*0.55 : labLen === 2 ? r*0.42 : r*0.32;
      return `<polygon points="0,${-r} ${r*0.92},${r*0.55} ${-r*0.92},${r*0.55}"
                fill="var(--att)" stroke="#0f1115" stroke-width="2"/>
              <text y="${r*0.35}" text-anchor="middle" font-size="${fs}" fill="#0f1115">${esc(label)}</text>`;
    }
    case "def": {
      const fs = labLen <= 1 ? r*0.78 : labLen === 2 ? r*0.6 : r*0.45;
      return `<circle r="${r}" fill="var(--def)" stroke="#0f1115" stroke-width="2"/>
              <text y="${r*0.3}" text-anchor="middle" font-size="${fs}" fill="#0f1115">${esc(label)}</text>`;
    }
    case "tw": {
      const fs = labLen <= 1 ? r*0.7 : labLen === 2 ? r*0.55 : r*0.42;
      return `<circle r="${r}" fill="none" stroke="var(--tw)" stroke-width="4"/>
              <circle r="${r-9}" fill="var(--tw)" stroke="#0f1115" stroke-width="2"/>
              <text y="${r*0.27}" text-anchor="middle" font-size="${fs}" fill="#0f1115">${esc(label)}</text>`;
    }
    case "sub": {
      const fs = labLen <= 1 ? r*0.7 : labLen === 2 ? r*0.55 : r*0.42;
      return `<circle r="${r}" fill="#e0d8c5" stroke="#444" stroke-width="2" stroke-dasharray="5 4"/>
              <text y="${r*0.3}" text-anchor="middle" font-size="${fs}" fill="#222">${esc(label)}</text>`;
    }
    case "ball": {
      const br = r*0.55;
      return `<circle r="${br}" fill="#f5f1e8" stroke="#1a1a1a" stroke-width="2"/>
              <text y="${br*0.32}" text-anchor="middle" font-size="${br*0.62}"
                fill="#1a1a1a" font-weight="700">Ball</text>`;
    }
    case "huetchen": {
      // Flaches rundes Hütchen, Farbe variabel (Default: Rot)
      const c   = opts.color || "#e85d2a";
      const cd  = opts.colorDark || "#7a2a0a";   // dunkle Variante für Innenkreis
      // Auto: dunkler Innenfarbe — wir nehmen einfach 30% Schwärzung
      return `<ellipse cx="0" cy="0" rx="${r*0.9}" ry="${r*0.5}"
                fill="${c}" stroke="${cd}" stroke-width="2"/>
              <ellipse cx="0" cy="${-r*0.1}" rx="${r*0.45}" ry="${r*0.25}"
                fill="${cd}" stroke="none" opacity="0.55"/>`;
    }
    case "pylon": {
      // Aufrecht stehender Pylon: Dreieck mit Boden
      return `<polygon points="0,${-r*0.85} ${r*0.55},${r*0.55} ${-r*0.55},${r*0.55}"
                fill="#ff6b35" stroke="#7a2a0a" stroke-width="2"/>
              <rect x="${-r*0.7}" y="${r*0.5}" width="${r*1.4}" height="${r*0.25}"
                fill="#c44a1f" stroke="#7a2a0a" stroke-width="1.5" rx="2"/>
              <!-- weißer Streifen für Wiedererkennbarkeit -->
              <polygon points="${-r*0.28} ${-r*0.1} ${r*0.28} ${-r*0.1} ${r*0.35} ${r*0.15} ${-r*0.35} ${r*0.15}"
                fill="#fff" opacity="0.85"/>`;
    }
    case "bank": {
      // Lange Turnhallen-Bank: 6r breit (= doppelt so lang wie Matte = ca. 3,6m)
      return `<rect x="${-r*3.0}" y="${-r*0.25}" width="${r*6.0}" height="${r*0.5}"
                fill="#a87444" stroke="#3a2410" stroke-width="2" rx="3"/>
              <rect x="${-r*2.7}" y="${r*0.25}" width="${r*0.22}" height="${r*0.6}"
                fill="#3a2410"/>
              <rect x="${r*2.48}" y="${r*0.25}" width="${r*0.22}" height="${r*0.6}"
                fill="#3a2410"/>
              <text y="${r*0.10}" text-anchor="middle" font-size="${r*0.42}"
                fill="#3a2410" font-weight="700">BANK</text>`;
    }
    case "matte": {
      // Turnmatte: 3r breit × 1,8r hoch (= ca. 1,8m × 1m, passt zur realen Mattengröße)
      return `<rect x="${-r*1.5}" y="${-r*0.9}" width="${r*3.0}" height="${r*1.8}"
                fill="#4a7ab8" stroke="#1a3055" stroke-width="2" rx="3"/>
              <rect x="${-r*1.3}" y="${-r*0.7}" width="${r*2.6}" height="${r*1.4}"
                fill="none" stroke="#7aa0d0" stroke-width="1" rx="2"/>
              <text y="${r*0.15}" text-anchor="middle" font-size="${r*0.5}"
                fill="#fff" font-weight="700" opacity="0.9">MATTE</text>`;
    }
    case "th": {
      // Trainingshelfer: grünes Quadrat mit "TH"
      return `<rect x="${-r*0.85}" y="${-r*0.85}" width="${r*1.7}" height="${r*1.7}"
                fill="#3da655" stroke="#1a4a26" stroke-width="2" rx="4"/>
              <text y="${r*0.32}" text-anchor="middle" font-size="${r*0.85}"
                fill="#fff" font-weight="700">TH</text>`;
    }
  }
  return "";
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function renderBank(){
  function fill(elId, kind, labels){
    const el = document.getElementById(elId);
    el.innerHTML = labels.map(lab => {
      const r = 30;
      const vb = `-${r+4} -${r+4} ${(r+4)*2} ${(r+4)*2}`;
      return `<div class="bank-item" data-kind="${kind}" data-label="${esc(lab)}">
        <svg viewBox="${vb}">${tokenSvg(kind, lab)}</svg></div>`;
    }).join("");
  }
  fill("bankAtt",  "att",  POOL_ATT);
  fill("bankDef",  "def",  POOL_DEF);
  // TW und TH gemeinsam in eine Grid-Zelle
  const elTwTh = document.getElementById("bankTwTh");
  if(elTwTh){
    const r = 30;
    const vb = `-${r+4} -${r+4} ${(r+4)*2} ${(r+4)*2}`;
    elTwTh.innerHTML =
      `<div class="bank-item" data-kind="tw" data-label="TW"><svg viewBox="${vb}">${tokenSvg("tw","TW")}</svg></div>`
    + `<div class="bank-item" data-kind="th" data-label=""><svg viewBox="${vb}">${tokenSvg("th","")}</svg></div>`;
  }
  fill("bankSub",  "sub",  POOL_SUB);
  fill("bankBall", "ball", POOL_BALL);

  // Material: jedes Element hat eigenes kind, kein Label
  const elMat = document.getElementById("bankMat");
  if(elMat){
    const KIND_FOR = {"Hütchen":"huetchen", "Pylon":"pylon", "Bank":"bank", "Matte":"matte"};
    elMat.innerHTML = POOL_MAT.map(lab => {
      const r = 30;
      const vb = `-${r+4} -${r+4} ${(r+4)*2} ${(r+4)*2}`;
      const kind = KIND_FOR[lab];
      return `<div class="bank-item" data-kind="${kind}" data-label="">
        <svg viewBox="${vb}">${tokenSvg(kind, "")}</svg></div>`;
    }).join("");
  }

  document.querySelectorAll(".bank-item").forEach(it=>{
    it.addEventListener("pointerdown", onBankPointerDown);
  });
}

function renderBoard(){
  const def = AUSSCHNITTE[STATE.schnitt];
  const board = document.getElementById("board");
  board.setAttribute("viewBox", def.vb);
  board.innerHTML = `
    <g id="pitch">${def.pitch()}</g>
    <defs>
      <marker id="arrRun" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L 10 5 L 0 10 z" fill="var(--pen-run)"/></marker>
      <marker id="arrPass" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L 10 5 L 0 10 z" fill="var(--pen-pass)"/></marker>
      <marker id="arrShot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L 10 5 L 0 10 z" fill="var(--pen-shot)"/></marker>
    </defs>
    <g id="lines"></g>
    <g id="tokens"></g>
  `;
  const linesG = board.querySelector("#lines");
  STATE.lines.forEach(l => linesG.appendChild(makeLineEl(l)));
  const tokG = board.querySelector("#tokens");
  STATE.tokens.forEach(t => tokG.appendChild(makeTokenEl(t)));
}

function makeTokenEl(t){
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("class","tb-token");
  // Rotation um den Token-Mittelpunkt (nach Translation), nur sinnvoll bei Bank/Matte
  const rot = t.rotation || 0;
  if(rot){
    g.setAttribute("transform", `translate(${t.x} ${t.y}) rotate(${rot})`);
  } else {
    g.setAttribute("transform", `translate(${t.x} ${t.y})`);
  }
  g.setAttribute("data-id", t.id);
  g.innerHTML = tokenSvg(t.kind, t.label, {color: t.color, colorDark: t.colorDark});
  g.addEventListener("pointerdown", onTokenPointerDown);
  return g;
}

function makeLineEl(l){
  const p = document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d", l.path);
  p.setAttribute("fill", "none");
  p.setAttribute("stroke", l.color);
  p.setAttribute("stroke-linecap","round");
  p.setAttribute("stroke-linejoin","round");
  p.setAttribute("data-id", l.id);
  if(l.kind === "shot"){
    p.setAttribute("stroke-width","6");
    p.setAttribute("marker-end","url(#arrShot)");
  } else if(l.kind === "pass"){
    p.setAttribute("stroke-width","4");
    p.setAttribute("stroke-dasharray","12 8");
    p.setAttribute("marker-end","url(#arrPass)");
  } else if(l.kind === "free"){
    // freier Stift: durchgezogen, gewählte Strichstärke (Default 3), ohne Pfeilspitze
    p.setAttribute("stroke-width", String(l.width || 3));
  } else {
    p.setAttribute("stroke-width","4");
    p.setAttribute("marker-end","url(#arrRun)");
  }
  p.addEventListener("pointerdown",(ev)=>{
    if(STATE.mode === "erase"){
      ev.stopPropagation();
      STATE.lines = STATE.lines.filter(x => x.id !== l.id);
      renderBoard();
    }
  });
  return p;
}

let dragInfo = null;

function onBankPointerDown(ev){
  if(STATE.mode !== "select") return;
  ev.preventDefault();
  const item = ev.currentTarget;
  const kind  = item.dataset.kind;
  const label = item.dataset.label;
  pushHistory();
  const tok = { id: STATE.nextId++, kind, label, labelMode:"position", x:100, y:100 };
  STATE.tokens.push(tok);
  renderBoard();
  const newEl = document.querySelector(`#tokens [data-id="${tok.id}"]`);
  if(newEl){
    const pt = clientToSvg(ev.clientX, ev.clientY);
    tok.x = pt.x; tok.y = pt.y;
    newEl.setAttribute("transform", `translate(${tok.x} ${tok.y})`);
    dragInfo = { tokenId: tok.id, offsetX:0, offsetY:0, pointerId: ev.pointerId, el: newEl, isNew:true };
    try{ newEl.setPointerCapture(ev.pointerId); }catch(e){}
    newEl.addEventListener("pointermove", onTokenPointerMove);
    newEl.addEventListener("pointerup", onTokenPointerUp);
    newEl.addEventListener("pointercancel", onTokenPointerUp);
  }
}

function onTokenPointerDown(ev){
  if(STATE.mode !== "select") return;
  ev.stopPropagation();
  const el = ev.currentTarget;
  const id = +el.dataset.id;
  const tok = STATE.tokens.find(t => t.id === id);
  if(!tok) return;
  pushHistory();   // Snapshot vor Verschiebung (oder Lösch-Drag)
  const pt = clientToSvg(ev.clientX, ev.clientY);
  dragInfo = { tokenId:id, offsetX:pt.x - tok.x, offsetY:pt.y - tok.y,
               pointerId:ev.pointerId, el, isNew:false,
               startX:ev.clientX, startY:ev.clientY, moved:false };
  el.classList.add("dragging");
  try{ el.setPointerCapture(ev.pointerId); }catch(e){}
  el.addEventListener("pointermove", onTokenPointerMove);
  el.addEventListener("pointerup", onTokenPointerUp);
  el.addEventListener("pointercancel", onTokenPointerUp);
}

function onTokenPointerMove(ev){
  if(!dragInfo || ev.pointerId !== dragInfo.pointerId) return;
  const dx = Math.abs(ev.clientX - (dragInfo.startX||ev.clientX));
  const dy = Math.abs(ev.clientY - (dragInfo.startY||ev.clientY));
  if(dx+dy > 3) dragInfo.moved = true;
  const pt = clientToSvg(ev.clientX, ev.clientY);
  const tok = STATE.tokens.find(t => t.id === dragInfo.tokenId);
  if(!tok) return;
  tok.x = pt.x - (dragInfo.offsetX||0);
  tok.y = pt.y - (dragInfo.offsetY||0);
  const rot = tok.rotation || 0;
  dragInfo.el.setAttribute("transform",
    rot ? `translate(${tok.x} ${tok.y}) rotate(${rot})` : `translate(${tok.x} ${tok.y})`);
}

function onTokenPointerUp(ev){
  if(!dragInfo || ev.pointerId !== dragInfo.pointerId) return;
  const tok = STATE.tokens.find(t => t.id === dragInfo.tokenId);
  const el = dragInfo.el;
  el.classList.remove("dragging");
  try{ el.releasePointerCapture(ev.pointerId); }catch(e){}
  el.removeEventListener("pointermove", onTokenPointerMove);
  el.removeEventListener("pointerup", onTokenPointerUp);
  el.removeEventListener("pointercancel", onTokenPointerUp);
  const def = AUSSCHNITTE[STATE.schnitt];
  const [, , w, h] = def.vb.split(" ").map(Number);
  if(tok && (tok.x < -30 || tok.x > w+30 || tok.y < -30 || tok.y > h+30)){
    STATE.tokens = STATE.tokens.filter(t => t.id !== tok.id);
    renderBoard();
  }
  dragInfo = null;
}

function clientToSvg(clientX, clientY){
  const svg = document.getElementById("board");
  const pt = svg.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  const ctm = svg.getScreenCTM();
  if(!ctm) return { x:0, y:0 };
  const r = pt.matrixTransform(ctm.inverse());
  return { x:r.x, y:r.y };
}

/* DOPPELKLICK */
let lastDoubleTokenId = null;
document.getElementById("board").addEventListener("dblclick",(ev)=>{
  ev.preventDefault();  // iOS-Doppeltap-Zoom unterdrücken
  const target = ev.target.closest(".tb-token");
  if(!target) return;
  ev.stopPropagation();
  const id = +target.dataset.id;
  const tok = STATE.tokens.find(t => t.id === id);
  if(!tok) return;

  // Bank/Matte: 22,5° rechtsherum drehen
  if(tok.kind === "bank" || tok.kind === "matte"){
    pushHistory();
    tok.rotation = ((tok.rotation || 0) + 22.5) % 360;
    renderBoard();
    return;
  }

  // Hütchen: Farbe durchschalten (Rot → Gelb → Grün → Blau → Rot)
  if(tok.kind === "huetchen"){
    const COLORS = [
      {color:"#e85d2a", dark:"#7a2a0a"},   // Rot
      {color:"#facc15", dark:"#854d0e"},   // Gelb
      {color:"#22c55e", dark:"#14532d"},   // Grün
      {color:"#3b82f6", dark:"#1e3a8a"}    // Blau
    ];
    let idx = COLORS.findIndex(c => c.color === tok.color);
    if(idx === -1) idx = 0;
    idx = (idx + 1) % COLORS.length;
    pushHistory();
    tok.color = COLORS[idx].color;
    tok.colorDark = COLORS[idx].dark;
    renderBoard();
    return;
  }

  // Andere Material-Symbole: keine Doppelklick-Aktion
  if(["pylon","th"].includes(tok.kind)) return;

  // Spieler: erst Position↔Nummer, dann Editor
  if(lastDoubleTokenId === id){
    oeffneLabelEditor(tok, target);
    lastDoubleTokenId = null;
    return;
  }
  pushHistory();
  toggleLabelMode(tok);
  renderBoard();
  lastDoubleTokenId = id;
  setTimeout(()=>{ if(lastDoubleTokenId === id) lastDoubleTokenId = null; }, 1500);
});

function toggleLabelMode(tok){
  const POS_TO_NUM = { LA:"1", RL:"2", RM:"3", RR:"4", RA:"5", KM:"6" };
  const NUM_TO_POS = Object.fromEntries(Object.entries(POS_TO_NUM).map(([k,v])=>[v,k]));
  if(tok.kind === "att"){
    if(tok.labelMode === "position"){
      tok.label = POS_TO_NUM[tok.label] || tok.label;
      tok.labelMode = "number";
    } else if(tok.labelMode === "number"){
      tok.label = NUM_TO_POS[tok.label] || tok.label;
      tok.labelMode = "position";
    }
  }
}

function oeffneLabelEditor(tok, tokenEl){
  const edit = document.getElementById("labelEdit");
  const inp = document.getElementById("labelInput");
  inp.value = tok.label || "";
  // Schnellauswahl-Buttons je nach Token-Typ befüllen
  const QUICK = {
    "att": {
      pos: ["LA","RL","RM","RR","RA","KM"],
      num: ["1","2","3","4","5","6","7"]
    },
    "def": {
      pos: ["AL","AR","HL","HR","ML","MR","VM"],
      num: ["1","2","3","4","5","6"]
    },
    "tw":  { pos: ["TW","TW2"] },
    "sub": { pos: ["W1","W2","W3","W4","W5","E"] },
    "ball":{ pos: ["B","B2","B3"] }
  };
  const q = QUICK[tok.kind] || {};
  const quickEl = document.getElementById("lblQuick");
  let html = "";
  if(q.pos && q.pos.length){
    html += `<div class="le-quick-label">Positionen</div>`;
    html += q.pos.map(p => `<button type="button" class="le-q-btn" data-val="${esc(p)}">${esc(p)}</button>`).join("");
  }
  if(q.num && q.num.length){
    html += `<div class="le-quick-label">Nummern</div>`;
    html += q.num.map(n => `<button type="button" class="le-q-btn" data-val="${esc(n)}">${esc(n)}</button>`).join("");
  }
  quickEl.innerHTML = html;
  // Klick-Handler: setzt Label sofort und schließt Popup
  quickEl.querySelectorAll(".le-q-btn").forEach(btn => {
    btn.addEventListener("click", ()=>{
      const val = btn.dataset.val;
      const t = STATE.tokens.find(x => x.id === +edit.dataset.tokenId);
      if(t){
        pushHistory();
        t.label = val;
        t.labelMode = /^[0-9]+$/.test(val) ? "number" : "position";
        renderBoard();
      }
      edit.classList.remove("show");
    });
  });
  // Positionierung relativ zum Token
  const box = tokenEl.getBoundingClientRect();
  const wrap = document.getElementById("boardWrap").getBoundingClientRect();
  edit.style.left = Math.max(8, Math.min(wrap.width - 260, box.left - wrap.left + 30)) + "px";
  edit.style.top  = Math.max(8, box.bottom - wrap.top + 8) + "px";
  edit.classList.add("show");
  edit.dataset.tokenId = tok.id;
  setTimeout(()=>{ inp.focus(); inp.select(); }, 50);
}

  document.getElementById("labelEdit").classList.remove("show");
});
document.getElementById("lblSave").addEventListener("click", ()=>{
  const edit = document.getElementById("labelEdit");
  const id = +edit.dataset.tokenId;
  const tok = STATE.tokens.find(t => t.id === id);

    pushHistory();
    tok.label = document.getElementById("labelInput").value.trim() || tok.label;
    tok.labelMode = "custom";

});

let FREE_COLOR = "#000000";  // aktuell gewählte Farbe des freien Stifts
let FREE_WIDTH = 3;          // aktuell gewählte Strichstärke

function setMode(m){
  STATE.mode = m;
  document.getElementById("modeSelect").setAttribute("aria-pressed", m==="select");
  ["penRun","penPass","penShot","penErase","penFree"].forEach(id=>{
    document.getElementById(id).setAttribute("aria-pressed","false");
  });
  if(m==="run")   document.getElementById("penRun").setAttribute("aria-pressed","true");
  if(m==="pass")  document.getElementById("penPass").setAttribute("aria-pressed","true");
  if(m==="shot")  document.getElementById("penShot").setAttribute("aria-pressed","true");
  if(m==="erase") document.getElementById("penErase").setAttribute("aria-pressed","true");
  if(m==="free")  document.getElementById("penFree").setAttribute("aria-pressed","true");
  // Palette schließen, wenn Modus ein anderer ist
  if(m !== "free") document.getElementById("penPalette").classList.remove("show");
}

document.getElementById("penPass").addEventListener("click",  ()=>setMode(STATE.mode==="pass"  ? "select" : "pass"));
document.getElementById("penShot").addEventListener("click",  ()=>setMode(STATE.mode==="shot"  ? "select" : "shot"));

/* Freier Stift: Klick wechselt in den Modus UND öffnet die Farbpalette.
   Erneuter Klick bei aktivem free-Modus schließt nur die Palette
   (oder schaltet zurück, wenn Palette bereits geschlossen war). */
document.getElementById("penFree").addEventListener("click", ()=>{
  const pal = document.getElementById("penPalette");
  if(STATE.mode === "free"){
    if(pal.classList.contains("show")){
      // Palette war offen → schließen, Modus bleibt
      pal.classList.remove("show");
    } else {
      // Modus war an, Palette zu → Modus aus
      setMode("select");
    }
  } else {
    setMode("free");
    pal.classList.add("show");
  }
});

/* STIFT-Zeichnen */
let drawInfo = null;
let eraseActive = false;  // Pointer ist im Radier-Modus gedrückt

document.getElementById("board").addEventListener("pointerdown",(ev)=>{
  if(STATE.mode === "select") return;
  if(ev.target.closest(".tb-token")) return;

  // RADIERER: Snapshot, dann Linie unter Cursor löschen, Streich-Modus starten
  if(STATE.mode === "erase"){
    ev.preventDefault();
    pushHistory();
    eraseLineAt(ev.clientX, ev.clientY);
    eraseActive = true;
    try{ document.getElementById("board").setPointerCapture(ev.pointerId); }catch(e){}
    return;
  }

  ev.preventDefault();
  pushHistory();   // Snapshot vor neuer Linie
  const pt = clientToSvg(ev.clientX, ev.clientY);
  const color = STATE.mode === "pass" ? "var(--pen-pass)"
              : STATE.mode === "shot" ? "var(--pen-shot)"
              : STATE.mode === "free" ? FREE_COLOR
              : "var(--pen-run)";
  const line = { id: STATE.nextId++, kind: STATE.mode, color,
                 width: (STATE.mode === "free") ? FREE_WIDTH : undefined,
                 path: `M ${pt.x.toFixed(1)} ${pt.y.toFixed(1)}` };
  STATE.lines.push(line);
  drawInfo = { lineId: line.id, pointerId: ev.pointerId, lastPt: pt };
  try{ document.getElementById("board").setPointerCapture(ev.pointerId); }catch(e){}
  renderBoard();
});

document.getElementById("board").addEventListener("pointermove",(ev)=>{
  // Radierer: Streichen löscht jede berührte Linie
  if(STATE.mode === "erase" && eraseActive){
    eraseLineAt(ev.clientX, ev.clientY);
    return;
  }
  if(!drawInfo || ev.pointerId !== drawInfo.pointerId) return;
  const pt = clientToSvg(ev.clientX, ev.clientY);
  const dx = pt.x - drawInfo.lastPt.x, dy = pt.y - drawInfo.lastPt.y;
  if(dx*dx + dy*dy < 25) return;
  drawInfo.lastPt = pt;
  const line = STATE.lines.find(l => l.id === drawInfo.lineId);
  if(!line) return;
  line.path += ` L ${pt.x.toFixed(1)} ${pt.y.toFixed(1)}`;
  const pathEl = document.querySelector(`#lines [data-id="${line.id}"]`);
  if(pathEl) pathEl.setAttribute("d", line.path);
});

document.getElementById("board").addEventListener("pointerup",(ev)=>{
  if(STATE.mode === "erase"){
    eraseActive = false;
    try{ document.getElementById("board").releasePointerCapture(ev.pointerId); }catch(e){}
    return;
  }
  if(!drawInfo || ev.pointerId !== drawInfo.pointerId) return;
  try{ document.getElementById("board").releasePointerCapture(ev.pointerId); }catch(e){}
  const line = STATE.lines.find(l => l.id === drawInfo.lineId);
  if(line && !line.path.includes(" L ")){
    STATE.lines = STATE.lines.filter(l => l.id !== line.id);
    renderBoard();
  }
  drawInfo = null;
});

/* Hilfsfunktion: löscht jede Linie, deren Pfad-Element unter dem Cursor liegt */
function eraseLineAt(clientX, clientY){
  // elementsFromPoint gibt alle Elemente unter dem Punkt zurück (auch unter Tokens)
  const elements = document.elementsFromPoint ? document.elementsFromPoint(clientX, clientY) : [document.elementFromPoint(clientX, clientY)];
  const toRemove = new Set();
  for(const el of elements){
    if(el && el.tagName === "path" && el.parentElement && el.parentElement.id === "lines"){
      const lid = +el.getAttribute("data-id");
      if(lid) toRemove.add(lid);
    }
  }
  if(toRemove.size === 0) return;
  STATE.lines = STATE.lines.filter(l => !toRemove.has(l.id));
  renderBoard();
}

document.getElementById("selPreset").addEventListener("change",(ev)=>{
  const key = ev.target.value;
  if(!key){ return; }
  const p = PRESETS[key]; if(!p){ return; }
  if((STATE.tokens.length || STATE.lines.length) &&
     !confirm("Aktuelles Board wird durch die Aufstellung ersetzt. Fortfahren?")){
    ev.target.value = ""; return;
  }
  pushHistory();
  STATE.schnitt = p.schnitt;
  document.getElementById("selAusschnitt").value = p.schnitt;
  STATE.tokens = p.tokens.map(t => Object.assign({}, t, {id:STATE.nextId++, labelMode:"position"}));
  STATE.lines = [];
  renderBoard();
  ev.target.value = "";
});

/* SPEICHERN / LADEN / EXPORT / IMPORT */
const STORAGE_KEY = "tb_konstellationen";
function ladeAlle(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }catch(e){ return []; } }
function speichereAlle(list){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
  catch(e){ alert("Speichern fehlgeschlagen — eventuell ist der Speicher voll."); }
}

  document.getElementById("savePanel").classList.add("show");

});

document.getElementById("saveOverlay").addEventListener("click", closeSave);

function saveCurrent(){
  const name = (document.getElementById("sdName").value || "").trim()
            || ("Konstellation " + new Date().toLocaleString("de-DE"));
  const k = {
    id: "k_" + Date.now() + "_" + Math.floor(Math.random()*9999),
    name, schnitt: STATE.schnitt,
    tokens: STATE.tokens.map(t=>({kind:t.kind, label:t.label, labelMode:t.labelMode, x:t.x, y:t.y})),
    lines:  STATE.lines.map(l=>({kind:l.kind, color:l.color, path:l.path})),
    gespeichert_am: new Date().toISOString(),
    plan_datum: null, rating: 0, kommentar: ""
  };
  const list = ladeAlle();
  list.unshift(k);
  if(list.length > 50) list.length = 50;
  speichereAlle(list);
  document.getElementById("saveDialog").classList.remove("show");
  renderSaveList();
}

document.getElementById("saveSort").addEventListener("change", renderSaveList);

function renderSaveList(){
  const list = ladeAlle();
  document.getElementById("saveCount").textContent = list.length;
  const sort = document.getElementById("saveSort").value;
  const sorted = list.slice().sort((a,b)=>{
    if(sort === "name_asc") return a.name.localeCompare(b.name,"de");
    if(sort === "rating_desc") return (b.rating||0)-(a.rating||0);
    if(sort === "datum_asc") return new Date(a.gespeichert_am)-new Date(b.gespeichert_am);
    return new Date(b.gespeichert_am)-new Date(a.gespeichert_am);
  });
  const out = document.getElementById("saveList");
  if(!list.length){
    out.innerHTML = `<div style="color:var(--muted);padding:20px;text-align:center">Noch nichts gespeichert.</div>`;
    return;
  }
  out.innerHTML = sorted.map(saveCardHtml).join("");
}

function saveCardHtml(k){
  const r = k.rating || 0;
  const sterne = [1,2,3,4,5].map(n =>
    `<span class="star${n<=r?' filled':''}" onclick="setKonstRating('${k.id}',${n});event.stopPropagation();">★</span>`
  ).join("");
  const dat = new Date(k.gespeichert_am).toLocaleString("de-DE",
    {day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});
  const planDate = k.plan_datum ? new Date(k.plan_datum).toLocaleDateString("de-DE") : "";
  return `
  <div class="save-card" data-id="${esc(k.id)}">
    <div class="sc-top" onclick="this.parentElement.classList.toggle('open')">
      <div style="flex:1;min-width:0">
        <div class="sc-name">${esc(k.name)}</div>
        <div class="sc-date">${esc(dat)}${planDate?" · geplant: "+esc(planDate):""}</div>
        <div class="sc-meta">${esc(AUSSCHNITTE[k.schnitt]?.label || k.schnitt)} · ${k.tokens.length} Spieler · ${k.lines.length} Linien</div>
      </div>
      <div class="sc-actions" onclick="event.stopPropagation();">
        <div class="sc-stars" title="Bewertung">${sterne}</div>
        <button class="icon-btn" onclick="ladeKonstellation('${esc(k.id)}')" title="Laden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 14v5a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="icon-btn danger" onclick="loescheKonstellation('${esc(k.id)}')" title="Löschen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
        </button>
      </div>
    </div>
    <div class="sc-body">
      <div class="sc-fields">
        <label>Geplantes Datum
          <input type="date" value="${esc(k.plan_datum||"")}" onchange="setKonstFeld('${esc(k.id)}','plan_datum',this.value||null)">
        </label>
        <label>Name
          <input type="text" value="${esc(k.name)}" onchange="setKonstFeld('${esc(k.id)}','name',this.value||'(ohne Name)')">
        </label>
        <label>Kommentar
          <textarea onchange="setKonstFeld('${esc(k.id)}','kommentar',this.value)">${esc(k.kommentar||"")}</textarea>
        </label>
      </div>
      <div class="sc-rowbtns">
        <button class="tb-action" onclick="exportiereKonst('${esc(k.id)}')">Einzeln exportieren</button>
        <button class="tb-action" onclick="druckeKonst('${esc(k.id)}')">PDF / Drucken</button>
      </div>
    </div>
  </div>`;
}

window.setKonstRating = function(id, n){
  const list = ladeAlle();
  const k = list.find(x=>x.id===id); if(!k) return;
  k.rating = (k.rating === n) ? 0 : n;
  speichereAlle(list); renderSaveList();
};
window.setKonstFeld = function(id, feld, val){
  const list = ladeAlle();
  const k = list.find(x=>x.id===id); if(!k) return;
  k[feld] = val;
  speichereAlle(list);
  if(feld === "name" || feld === "plan_datum") renderSaveList();
};
window.ladeKonstellation = function(id){
  const list = ladeAlle();
  const k = list.find(x=>x.id===id); if(!k) return;
  if((STATE.tokens.length || STATE.lines.length) && !confirm("Aktuelles Board wird ersetzt. Fortfahren?")) return;
  STATE.schnitt = k.schnitt;
  document.getElementById("selAusschnitt").value = k.schnitt;
  STATE.tokens = k.tokens.map(t => Object.assign({}, t, {id:STATE.nextId++}));
  STATE.lines  = k.lines.map(l => Object.assign({}, l, {id:STATE.nextId++}));
  renderBoard();
  closeSave();
};
window.loescheKonstellation = function(id){
  if(!confirm("Diese Konstellation löschen?")) return;
  let list = ladeAlle();
  list = list.filter(x=>x.id !== id);
  speichereAlle(list); renderSaveList();
};

function downloadJson(filename, obj){
  const blob = new Blob([JSON.stringify(obj, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}
document.getElementById("btnExportAll").addEventListener("click",()=>{
  const list = ladeAlle();
  if(!list.length){ alert("Nichts zu exportieren."); return; }
  const stamp = new Date().toISOString().slice(0,10);
  downloadJson(`Taktikboard_${stamp}.json`,
    { _meta:{format:"tb-konstellationen/v1", exportiert_am:new Date().toISOString(), anzahl:list.length},
      konstellationen:list });
});
window.exportiereKonst = function(id){
  const list = ladeAlle();
  const k = list.find(x=>x.id===id); if(!k) return;
  const sane = (k.name||"konstellation").replace(/[^a-zA-Z0-9äöüÄÖÜß_-]+/g,"_").slice(0,40);
  downloadJson(`Taktik_${sane}.json`,
    { _meta:{format:"tb-konstellation/v1", exportiert_am:new Date().toISOString()}, konstellation:k });
};
document.getElementById("impFile").addEventListener("change", async (ev)=>{
  const file = ev.target.files[0];
  if(!file) return;
  try{
    const data = JSON.parse(await file.text());
    let imp = [];
    if(Array.isArray(data.konstellationen)) imp = data.konstellationen;
    else if(data.konstellation) imp = [data.konstellation];
    else if(Array.isArray(data)) imp = data;
    else throw new Error("Unbekanntes Dateiformat");
    imp = imp.filter(k => k && Array.isArray(k.tokens) && Array.isArray(k.lines) && k.schnitt);
    if(!imp.length) throw new Error("Keine gültigen Konstellationen");
    const list = ladeAlle();
    const exist = new Set(list.map(k => k.id));
    let neu = 0;
    imp.forEach(k=>{
      if(!k.id) k.id = "k_" + Date.now() + "_" + Math.floor(Math.random()*9999);
      if(!exist.has(k.id)){ list.unshift(k); neu++; }
    });
    if(list.length > 50) list.length = 50;
    speichereAlle(list);
    renderSaveList();
    alert(`${neu} von ${imp.length} Konstellationen importiert.`);
  }catch(err){
    alert("Import fehlgeschlagen: " + err.message);
  }
  ev.target.value = "";
});

      <div class="pv-meta">
        <span><b>Gedruckt:</b> ${new Date().toLocaleString("de-DE")}</span>
        <span><b>Spieler:</b> ${STATE.tokens.length}</span>
        <span><b>Linien:</b> ${STATE.lines.length}</span>
      </div>
    </div>
    <div class="pv-board">${svgClone.outerHTML}</div>`;
  setTimeout(()=>window.print(), 100);
}

window.druckeKonst = function(id){
  const list = ladeAlle();
  const k = list.find(x=>x.id===id); if(!k) return;
  const savedTokens = STATE.tokens, savedLines = STATE.lines, savedSchnitt = STATE.schnitt;
  STATE.schnitt = k.schnitt;
  STATE.tokens = k.tokens.map(t => Object.assign({}, t, {id:STATE.nextId++}));
  STATE.lines  = k.lines.map(l => Object.assign({}, l, {id:STATE.nextId++}));
  renderBoard();
  setTimeout(()=>{
    const def = AUSSCHNITTE[STATE.schnitt];
    const svgClone = document.getElementById("board").cloneNode(true);
    svgClone.removeAttribute("class"); svgClone.removeAttribute("style");
    inlineSvgColors(svgClone);
    const dat = new Date(k.gespeichert_am).toLocaleString("de-DE");
    const planDate = k.plan_datum ? new Date(k.plan_datum).toLocaleDateString("de-DE") : "—";
    const sterne = k.rating ? "★".repeat(k.rating)+"☆".repeat(5-k.rating) : "—";
    document.getElementById("printView").innerHTML = `
      <div class="pv-head">
        <h1>${esc(k.name)}</h1>
        <div class="pv-meta">
          <span><b>Ausschnitt:</b> ${esc(def.label)}</span>
          <span><b>Geplant:</b> ${esc(planDate)}</span>
          <span><b>Bewertung:</b> ${sterne}</span>
          <span><b>Gespeichert:</b> ${esc(dat)}</span>
        </div>
      </div>
      <div class="pv-board">${svgClone.outerHTML}</div>
      ${k.kommentar?`<div class="pv-foot"><div class="pv-comment"><b>Kommentar:</b> ${esc(k.kommentar)}</div></div>`:""}`;
    window.print();
    setTimeout(()=>{
      STATE.tokens = savedTokens; STATE.lines = savedLines; STATE.schnitt = savedSchnitt;
      document.getElementById("selAusschnitt").value = savedSchnitt;
      renderBoard();
    }, 200);
  }, 100);
};

function inlineSvgColors(svg){
  const map = {
    "var(--court-bg)":"#f4eee2","var(--court-line)":"#7a6e54","var(--court-line-thin)":"#a0916f",
    "var(--att)":"#ff8a00","var(--def)":"#3ec1ff","var(--tw)":"#5dd39e","var(--ball)":"#ffd166",
    "var(--pen-run)":"#ff8a00","var(--pen-pass)":"#3ec1ff","var(--pen-shot)":"#ef476f"
  };
  svg.querySelectorAll("*").forEach(el=>{
    ["fill","stroke"].forEach(attr=>{
      const v = el.getAttribute(attr);
      if(v && map[v]) el.setAttribute(attr, map[v]);
    });
  });
}

/* Bank-Scroll-Buttons: scrollen Inhalt um 120px je Tipp */
(function bankScrollSetup(){
  const content = document.getElementById("bankContent");
  const btnUp = document.getElementById("bankUp");
  const btnDown = document.getElementById("bankDown");
  if(!content || !btnUp || !btnDown) return;
  function updateButtons(){
    btnUp.disabled = content.scrollTop <= 0;
    btnDown.disabled = content.scrollTop + content.clientHeight >= content.scrollHeight - 1;
  }
  function scrollBy(delta){
    content.scrollBy({top: delta, behavior:"smooth"});
    // Buttons mit kurzer Verzögerung aktualisieren (nach smooth scroll)
    setTimeout(updateButtons, 350);
  }
  btnUp.addEventListener("click", ()=>scrollBy(-120));
  btnDown.addEventListener("click", ()=>scrollBy(120));
  content.addEventListener("scroll", updateButtons);
  // Initialzustand
  setTimeout(updateButtons, 100);
})();

/* Preset-Dropdown aus PRESETS befüllen, gruppiert nach S-/T-Präfix */
(function fillPresetDropdown(){
  const sel = document.getElementById("selPreset");
  const sKeys = Object.keys(PRESETS).filter(k => k.startsWith("S-")).sort();
  const tKeys = Object.keys(PRESETS).filter(k => k.startsWith("T-")).sort();
  function addGroup(label, keys){
    if(!keys.length) return;
    const og = document.createElement("optgroup");
    og.label = label;
    keys.forEach(k => {
      const opt = document.createElement("option");
      opt.value = k;
      opt.textContent = PRESETS[k].label || k;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  }
  addGroup("Spielsituationen", sKeys);
  addGroup("Trainingssituationen", tKeys);
})();
</script>
